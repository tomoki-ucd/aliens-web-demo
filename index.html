<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AiLens BLE Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 40px auto; padding: 0 20px; }
    button { padding: 10px 20px; font-size: 16px; margin: 6px 4px; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    .inputs { margin: 12px 0; display: flex; flex-direction: column; gap: 8px; }
    .inputs label { font-size: 14px; font-weight: bold; }
    .inputs input { padding: 8px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; }
    #log { margin-top: 20px; background: #f4f4f4; padding: 12px; border-radius: 6px;
           font-family: monospace; font-size: 13px; white-space: pre-wrap; min-height: 80px; }
    .ok  { color: green; }
    .err { color: red; }
  </style>
</head>
<body>
  <h2>AiLens BLE Demo</h2>
  <button id="btnConnect">Scan &amp; Connect</button>
  <button id="btnDisconnect" disabled>Disconnect</button>

  <div class="inputs">
    <label>Original text</label>
    <input id="original" type="text" value="Hello, world" placeholder="Original" />
    <label>Translation text</label>
    <input id="translation" type="text" value="こんにちは, 世界" placeholder="Translation" />
  </div>
  <button id="btnLongPress" style="display:none">Continue (long-press done)</button>
  <button id="btnStart" disabled>Start (2s interval)</button>
  <button id="btnStop" disabled>Stop</button>
  <button id="btnReset" disabled>Reset Count</button>
  <div id="counter" style="margin-top:8px; font-size:14px; color:#555;">Count: 1</div>

  <div id="log">Ready.</div>

<script>
// ── UUIDs ──────────────────────────────────────────────────────────────────
const SERVICE_UUID   = '00010000-0000-1000-8000-00805f9b5a6b';
const WRITE_UUID     = '00010001-0000-1000-8000-00805f9b5a6b';
const TX_UUID        = '00010002-0000-1000-8000-00805f9b5a6b';
const HANDSHAKE_UUID = '00010003-0000-1000-8000-00805f9b5a6b';

// ── CRC-32 (metaCRC32 from CRC.swift) ─────────────────────────────────────
const RAW_TABLE = [
  0,517762881,1035525762,593801667,2071051524,1705890373,1187603334,1477774535,
  -152864248,-398518967,-883186550,-712520757,-1919760628,-1823561651,-1339418226,-1359579441,
  -216360111,-305728496,-828226093,-797037934,-2006243755,-1766373100,-1244399401,-1425041514,
  100262233,455446040,943800283,647843994,2122865757,1616130844,1127252703,1575808414,
  -118924829,-432720222,-984512671,-611456992,-2087131929,-1656452186,-1105184155,-1594075868,
  235545579,282479786,867368297,762221096,1971035887,1806168494,1220755565,1444884268,
  200524466,355446259,910892080,681014129,1887600566,1851658487,1295687988,1407635061,
  -49235782,-473114629,-1062705608,-562820743,-2040461890,-1732416769,-1143350468,-1526352771,
  -284238713,-237849658,-759823867,-865440444,-1803591293,-1969025342,-1446527231,-1222913984,
  435005071,120703438,609581069,982062924,1654397835,2084598986,1596245257,1106815560,
  471091158,46672023,564959572,1064367637,1734736594,2042205587,1524442192,1140935441,
  -352895522,-198487393,-682630308,-913077219,-1853456166,-1889865829,-1405198760,-1293799143,
  401048932,154921509,710892518,881013927,1821784160,1917474593,1362028258,1341295011,
  -519766164,-2584531,-591650322,-1033875793,-1703591320,-2069287639,-1479697174,-1190005845,
  -453173707,-98471564,-649740105,-946229258,-1618173135,-2125411216,-1573618253,-1125641486,
  303981629,214043516,799455935,830133758,1768937785,2008266360,1423378363,1242261754,
  -1061038513,-568477426,-42399539,-475699316,-1146066101,-1519647734,-2046249527,-1730880888,
  908241991,687784710,194671301,356916612,1297289539,1401912834,1894502337,1849139328,
  870010142,755442271,241406876,281017565,1219162138,1450614619,1964125848,1808679385,
  -986171626,-605792169,-125769324,-430143787,-1102476782,-1600789165,-2081336176,-1657979951,
  942182316,653582573,93344046,457981551,1129919144,1569021417,2128735274,1614644075,
  -825494108,-803759387,-210556122,-307280793,-1246082912,-1419368479,-2013096414,-1763772061,
  -885910275,-705791044,-158676353,-396974786,-1337742855,-1365260616,-1912899717,-1826154438,
  1037135605,588054964,6926455,515235638,1184945137,1484569776,2065173875,1707369010,
  802097864,823354761,309843018,212581131,1421785036,1247991949,1762027854,2010777103,
  -651398976,-940564607,-460018110,-95895293,-1570910780,-1132354939,-1612377274,-2126939129,
  -589983335,-1039532328,-512930021,-5169062,-1482412899,-1183300644,-1709379041,-2067751586,
  708242321,887784656,395195667,156392018,1363629717,1335572948,1828685847,1914955606,
  -685354197,-906347414,-358707799,-196943128,-1403523537,-1299480210,-1846595411,-1892458516,
  566569251,1058621026,478017441,44144864,1521783847,1147730790,1728858789,2043684324,
  607963258,987801403,428087032,123238841,1598911870,1100028479,1660267516,2083112125,
  -757091726,-872161997,-278434576,-239402063,-1448210570,-1217241033,-1810443788,-1966424395,
];
const CRC32_TABLE = new Uint32Array(RAW_TABLE.map(v => v >>> 0));

function metaCRC32(bytes) {
  let crc = 0;
  for (const b of bytes) {
    crc = ((crc << 8) ^ CRC32_TABLE[((b ^ (crc >>> 24)) & 0xFF)]) >>> 0;
  }
  return crc;
}

// ── Little-endian helpers ──────────────────────────────────────────────────
function u16le(v) { return [v & 0xFF, (v >> 8) & 0xFF]; }
function u32le(v) { v = v >>> 0; return [v & 0xFF, (v>>8)&0xFF, (v>>16)&0xFF, (v>>24)&0xFF]; }

// ── Simultaneous Translation packet builder ────────────────────────────────
// Mirrors TextToSimultaneousTranslationCommand + XRBinaryPacketFramer in Swift
function buildTranslationFrames(sessionId, original, translation, mtu = 185) {
  const enc = new TextEncoder();
  const originalBytes  = [...enc.encode(original)];
  const translationBytes = [...enc.encode(translation)];

  // TLV: [type(1), len_lo, len_hi, ...value]
  const tlv89 = [0x89, ...u16le(originalBytes.length),    ...originalBytes];
  const tlv8A = [0x8A, ...u16le(translationBytes.length), ...translationBytes];

  // Inner content: [sessionId] + TLVs
  const inner = [sessionId & 0xFF, ...tlv89, ...tlv8A];

  const BIN_TYPE = 0x67;

  // CommData Head: [binType(1), inner_len(4), CRC32(inner)(4), 0xFF×16]
  const commHead = [
    BIN_TYPE,
    ...u32le(inner.length),
    ...u32le(metaCRC32(inner)),
    ...new Array(16).fill(0xFF),   // reserved override = all 0xFF (not 0x00 like canvas)
  ];

  const commonData = [...commHead, ...inner];
  const maxSub = Math.max(1, mtu - 18); // 18 = 8 (cmd head) + 10 (packet head)

  const frames = [];
  let index = 0, offset = 0;

  while (offset < commonData.length) {
    const end = Math.min(offset + maxSub, commonData.length);
    const sub = commonData.slice(offset, end);
    const isFirst = offset === 0;
    const isLast  = end === commonData.length;

    // sliceType: 0x00=begin, 0x01=middle, 0x02=end
    const sliceType = isFirst ? 0x00 : (isLast ? 0x02 : 0x01);

    // Packet head (10 bytes): [binType, sliceType, CRC32(sub)(4), index(4)]
    const pktHead = [BIN_TYPE, sliceType, ...u32le(metaCRC32(sub)), ...u32le(index)];

    const valueLen = pktHead.length + sub.length;  // 10 + sub.length

    // CMD header (8 bytes): [45 4D 1A 00, valueLen(2), valueLen*2(2)]
    const cmdHead = [0x45, 0x4D, 0x1A, 0x00, ...u16le(valueLen), ...u16le(valueLen * 2)];

    frames.push(new Uint8Array([...cmdHead, ...pktHead, ...sub]));
    offset = end;
    index++;
  }

  return frames;
}

// ── Raw fixed commands ─────────────────────────────────────────────────────
const CMD_DISCONNECT         = new Uint8Array([0x45,0x4D,0x73,0x00,0x00,0x00,0x00,0x00]);
const CMD_GLASS_LONG_PRESS   = new Uint8Array([0x45,0x4D,0x00,0x00,0x00,0x00,0x00,0x00]);
// CMD_SET_PHONE_TYPE (0x67) REQ — payload: type byte. iOS=0x01, Android=0x0A (protocol manual §4.102)
const CMD_APP_SHOW_PAIR      = new Uint8Array([0x45,0x4D,0x67,0x00,0x01,0x00,0x02,0x00,0x01]);
// connectSucceedResponseCommand from iOS SDK — sent in response to 45 4D 68 00 ... 01
const CMD_CONNECT_SUCCEED    = new Uint8Array([0x4F,0x42,0x68,0x00,0x00,0x00,0x00,0x00]);
// reportBluetoothStatusCommand from iOS SDK — polled every 1 s to keep connection alive
const CMD_BT_STATUS_POLL     = new Uint8Array([0x45,0x4D,0x3A,0x00,0x00,0x00,0x00,0x00]);
// CMD_BTCONNECT_BACK_ENABLE (0x39) with value=0: disable BT auto-reconnect (protocol manual §4.57)
// Sent after handshake to prevent the glasses from requiring Classic BT within 30 s.
const CMD_BT_RECONNECT_OFF   = new Uint8Array([0x45,0x4D,0x39,0x00,0x01,0x00,0x02,0x00,0x00]);
// CMD_PAIR_STATE_SYNC (0x68) REQ from host with status=1 (§4.103).
// On iOS/Android the glasses send this REQ after Classic BT pairs; host responds with CMD_CONNECT_SUCCEED RSP.
// On Windows Classic BT never connects so the glasses never send it.
// Hypothesis: sending it from the HOST side tells the glasses "pairing complete" and clears the 30 s timer.
const CMD_PAIR_SYNC_SUCCESS  = new Uint8Array([0x45,0x4D,0x68,0x00,0x01,0x00,0x02,0x00,0x01]);
const HANDSHAKE_TOKEN      = new Uint8Array([
  0xA4,0x6A,0xD6,0xE0,0x35,0x82,0x00,0x00,
  0x10,0x01,0xC0,0xEF,0x1A,0x03,0x2B,0xA8,
  0x40,0x14,0x87,0x30,0x1C,0xB8,0xA5,0x61,
  0xEC,0x77,0x8D,
]);

// ── State ──────────────────────────────────────────────────────────────────
let device = null, writeChar = null, txChar = null;
let txNotificationsWorking = false;
let isReady = false;
let sessionId = 1;
let sendCount = 1;
let autoTimer = null;
let btStatusPollTimer = null;

// ── ACK waiting ────────────────────────────────────────────────────────────
let ackResolve = null;
function notifyAck() { if (ackResolve) { ackResolve(); ackResolve = null; } }
function waitForAck(ms = 1000) {
  return new Promise(resolve => {
    ackResolve = resolve;
    setTimeout(() => { ackResolve = null; resolve(); }, ms);
  });
}

// ── BT status polling (reportBluetoothStatusCommand, iOS SDK §beginClassicPairingConfirmation) ──
// Glasses require periodic 45 4D 3A 00 polls to stay connected after pairing.
function startBtStatusPolling() {
  stopBtStatusPolling();
  log('BT status polling started (1 s interval)');
  btStatusPollTimer = setInterval(() => {
    if (!writeChar) { stopBtStatusPolling(); return; }
    writeChar.writeValueWithoutResponse(CMD_BT_STATUS_POLL)
      .catch(e => log(`BT status poll error: ${e.message}`, 'err'));
  }, 1000);
}

function stopBtStatusPolling() {
  if (btStatusPollTimer !== null) {
    clearInterval(btStatusPollTimer);
    btStatusPollTimer = null;
  }
}

// ── Logging ────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(msg, cls) {
  const ts = new Date().toLocaleTimeString('en-US', {
    hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit',
    fractionalSecondDigits: 1,
  });
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = `[${ts}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── UI ─────────────────────────────────────────────────────────────────────
const btnConnect    = document.getElementById('btnConnect');
const btnDisconnect = document.getElementById('btnDisconnect');
const btnLongPress  = document.getElementById('btnLongPress');
const btnStart      = document.getElementById('btnStart');
const btnStop       = document.getElementById('btnStop');
const btnReset      = document.getElementById('btnReset');
const counterEl     = document.getElementById('counter');

let longPressResolve = null;

btnConnect.addEventListener('click', connect);
btnDisconnect.addEventListener('click', disconnect);
btnLongPress.addEventListener('click', () => {
  btnLongPress.style.display = 'none';
  if (longPressResolve) { longPressResolve(); longPressResolve = null; }
});
btnStart.addEventListener('click', startAuto);
btnStop.addEventListener('click', stopAuto);
btnReset.addEventListener('click', () => {
  sendCount = 1;
  counterEl.textContent = `Count: ${sendCount}`;
});

function waitForUserLongPress() {
  return new Promise(resolve => {
    longPressResolve = resolve;
    btnLongPress.style.display = 'inline-block';
  });
}

// ── Connect & handshake ────────────────────────────────────────────────────
async function connect() {
  try {
    btnConnect.disabled = true;
    log('Scanning for Ai Lens devices…');

    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID],
    });
    if (!device.name?.includes('Ai Lens')) {
      device.gatt.disconnect();
      throw new Error(`"${device.name}" is not an Ai Lens device`);
    }
    log(`Found: ${device.name}`);
    device.addEventListener('gattserverdisconnected', onDisconnected);

    log('Connecting to GATT…');
    let server;
    for (let attempt = 1; attempt <= 5; attempt++) {
      try {
        server = await Promise.race([
          device.gatt.connect(),
          new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000)),
        ]);
        break;
      } catch (e) {
        log(`GATT attempt ${attempt} failed (${e.message}), retrying…`);
        await new Promise(r => setTimeout(r, 1000));
        if (attempt === 5) throw new Error('Could not connect after 5 attempts');
      }
    }

    await new Promise(r => setTimeout(r, 500));
    const service  = await server.getPrimaryService(SERVICE_UUID);
    writeChar      = await service.getCharacteristic(WRITE_UUID);
    txChar         = await service.getCharacteristic(TX_UUID);
    const hsChar   = await service.getCharacteristic(HANDSHAKE_UUID);
    log('Characteristics ready');

    // Best-effort TX notifications before pairing. May fail on Windows (CCCD requires bonding).
    try {
      await txChar.startNotifications();
      txChar.addEventListener('characteristicvaluechanged', onTX);
      txNotificationsWorking = true;
      log('TX notifications enabled (pre-pairing)');
    } catch(e) {
      log(`TX notifications unavailable pre-pairing (${e.message}) — will retry after pairing`);
    }

    // Phase 1: handshake token
    log('Writing handshake token…');
    try {
      await hsChar.writeValueWithResponse(HANDSHAKE_TOKEN);
      log('Handshake write: withResponse OK');
    } catch(e) {
      log(`Handshake write: withResponse failed (${e.message}), trying withoutResponse`);
      await hsChar.writeValueWithoutResponse(HANDSHAKE_TOKEN);
    }
    await new Promise(r => setTimeout(r, 250));
    const hsVal   = await hsChar.readValue();
    const hsBytes = new Uint8Array(hsVal.buffer);
    const hsHex   = [...hsBytes].map(b => b.toString(16).padStart(2,'0')).join(' ');
    log(`Handshake response (${hsBytes.length} bytes): ${hsHex}`);

    if (hsBytes.length !== 18 || ![0x64, 0x65, 0x66].includes(hsBytes[0])) {
      throw new Error(`Handshake failed (b0=0x${hsBytes[0]?.toString(16)})`);
    }
    log('Handshake OK', 'ok');

    // Disable BT auto-reconnect (§4.57 CMD_BTCONNECT_BACK_ENABLE = 0).
    // Hypothesis: this prevents the glasses from requiring Classic BT to connect
    // within the 30-second pairing window and then disconnecting BLE.
    log('Sending CMD_BT_RECONNECT_OFF (disable BT auto-reconnect)…');
    await writeChar.writeValueWithoutResponse(CMD_BT_RECONNECT_OFF);
    await new Promise(r => setTimeout(r, 100));

    // Phase 2: pairing — requires physical long-press on the glasses touch bar.
    // TX notifications are unavailable on Windows, so we can't detect the long-press
    // automatically. Show a button and wait for the user to confirm.
    log('Sending CMD_GLASS_LONG_PRESS…');
    await writeChar.writeValueWithoutResponse(CMD_GLASS_LONG_PRESS);
    log('*** Long-press the touch bar on your glasses, then click "Continue (long-press done)" ***');
    await waitForUserLongPress();
    log('Long-press confirmed — sending CMD_APP_SHOW_PAIR…');
    await writeChar.writeValueWithoutResponse(CMD_APP_SHOW_PAIR);

    // Retry TX notifications now that the BLE link is paired/secured.
    if (!txNotificationsWorking) {
      log('Retrying TX notifications after pairing…');
      try {
        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', onTX);
        txNotificationsWorking = true;
        log('TX notifications enabled (post-pairing)', 'ok');
      } catch(e) {
        log(`TX notifications still unavailable (${e.message}) — ACKs via timeout`);
      }
    }

    isReady = true;
    log('Glasses ready!', 'ok');
    btnStart.disabled      = false;
    btnReset.disabled      = false;
    btnDisconnect.disabled = false;
    btnConnect.disabled    = true;

  } catch (e) {
    log(`Error: ${e.message}`, 'err');
    btnConnect.disabled = false;
  }
}

// ── TX handler ─────────────────────────────────────────────────────────────
// Deduplicate: Chrome/Windows fires each BLE notification twice.
let _lastTxHex = '', _lastTxMs = 0;

async function onTX(event) {
  const data = new Uint8Array(event.target.value.buffer);
  const hex  = [...data].map(b => b.toString(16).padStart(2,'0')).join(' ');

  // Drop exact duplicates that arrive within 200 ms of each other.
  const now = Date.now();
  if (hex === _lastTxHex && now - _lastTxMs < 200) return;
  _lastTxHex = hex; _lastTxMs = now;

  // ── 4F 42 … — ACK / response family ────────────────────────────────────
  if (data[0] === 0x4F && data[1] === 0x42) {

    // BT status response (4F 42 3A 00 ..., ≥11 bytes) — reply to CMD_BT_STATUS_POLL
    // Protocol manual §4.58: RSP payload = status + addressSaved + connectStatus
    // addressSaved=1 means Classic BT address saved; connectStatus=1 means Classic BT connected.
    if (data[2] === 0x3A && data[3] === 0x00 && data.length >= 11) {
      const result        = data[8];
      const addressSaved  = data[data.length - 2] === 0x01;
      const connectStatus = data[data.length - 1] === 0x01;
      log(`TX BT status: result=0x${result.toString(16)} addressSaved=${addressSaved} connectStatus=${connectStatus} [${hex}]`);
      if (connectStatus) {
        log('Classic BT connected (connectStatus=1) — connection fully confirmed', 'ok');
        stopBtStatusPolling();
        if (!isReady) {
          isReady = true;
          log('Glasses fully ready!', 'ok');
          btnStart.disabled      = false;
          btnReset.disabled      = false;
          btnDisconnect.disabled = false;
          btnConnect.disabled    = true;
        }
      }
      return;
    }

    // longPressTimeoutResponse = 4F 42 00 00 01 00 02 00 1C (last byte 0x1C)
    // iOS SDK: sets state = .disconnected
    if (data.length === 9 &&
        data[2]===0x00 && data[3]===0x00 && data[4]===0x01 &&
        data[5]===0x00 && data[6]===0x02 && data[7]===0x00 && data[8]===0x1C) {
      log(`TX longPressTimeoutResponse — long-press timed out`, 'err');
      return;
    }

    // longPressConfirmResponse = 4F 42 00 00 01 00 02 00 00 (last byte 0x00)
    // Android SDK: send APP_SHOW_PAIR then declare connected immediately (no Classic BT wait).
    // Also start BT polling as keepalive — critical for Windows where classicConnected never fires.
    if (data.length === 9 &&
        data[2]===0x00 && data[3]===0x00 && data[4]===0x01 &&
        data[5]===0x00 && data[6]===0x02 && data[7]===0x00 && data[8]===0x00) {
      log(`TX longPressConfirmResponse: ${hex} — sending APP_SHOW_PAIR + PAIR_SYNC_SUCCESS + starting BT polling`);
      if (writeChar) {
        (async () => {
          await writeChar.writeValueWithoutResponse(CMD_APP_SHOW_PAIR);
          // Host-initiated CMD_PAIR_STATE_SYNC REQ (status=1): attempt to tell the glasses
          // that pairing is complete without Classic BT (Windows workaround).
          log('Sending CMD_PAIR_SYNC_SUCCESS (host-initiated pair state sync)…');
          await writeChar.writeValueWithoutResponse(CMD_PAIR_SYNC_SUCCESS);
        })().catch(e => log(`longPressConfirm sequence error: ${e.message}`, 'err'));
      }
      startBtStatusPolling();
      return;
    }

    log(`TX ACK: ${hex}`);
    notifyAck();
    return;
  }

  // ── 45 4D … — glasses-originated EM frames ──────────────────────────────
  if (data[0] === 0x45 && data[1] === 0x4D) {

    // userPressPairingCheck = 45 4D 68 00 xx xx xx xx xx (9 bytes)
    // iOS SDK: if last==0x01 → send connectSucceedResponseCommand + beginClassicPairingConfirmation
    //          if last==0x00 → set state = .disconnected
    if (data[2] === 0x68 && data[3] === 0x00) {
      if (data.length === 9 && data[8] === 0x01) {
        log(`TX: 45 4D 68 00 ... 01 — pairing confirmed; sending connectSucceedResponse + starting BT polling`);
        if (writeChar) {
          (async () => {
            await writeChar.writeValueWithoutResponse(CMD_CONNECT_SUCCEED);
            // iOS SDK beginClassicPairingConfirmation() also sends APP_SHOW_PAIR before polling
            await writeChar.writeValueWithoutResponse(CMD_APP_SHOW_PAIR);
            startBtStatusPolling();
            if (!isReady) {
              isReady = true;
              log('Glasses fully ready!', 'ok');
              btnStart.disabled      = false;
              btnReset.disabled      = false;
              btnDisconnect.disabled = false;
              btnConnect.disabled    = true;
            }
          })().catch(e => log(`pairing confirm error: ${e.message}`, 'err'));
        }
      } else if (data.length === 9 && data[8] === 0x00) {
        log(`TX: 45 4D 68 00 ... 00 — glasses rejected pairing`, 'err');
      } else {
        log(`TX: 45 4D 68 00 (${data.length} bytes): ${hex}`);
      }
      return;
    }

    if (data[2] === 0x15 && data[3] === 0x00) { return; } // IMU, ignore silently

    // 0x0010: session keepalive — reply with CMD_BT_STATUS_POLL (matches iOS poll pattern)
    if (data[2] === 0x10 && data[3] === 0x00) {
      log(`TX 0x0010: ${hex} — replying with BT status poll`);
      if (writeChar) writeChar.writeValueWithoutResponse(CMD_BT_STATUS_POLL)
        .catch(e => log(`0x0010 reply error: ${e.message}`, 'err'));
      return;
    }
  }

  // ── TX [0x01] — glasses requesting long-press ────────────────────────────
  // Android SDK pattern: immediately send CMD_GLASS_LONG_PRESS + CMD_APP_SHOW_PAIR together.
  // (iOS sends only CMD_GLASS_LONG_PRESS here, then APP_SHOW_PAIR after longPressConfirmResponse.)
  if (data.length === 1 && data[0] === 0x01) {
    if (writeChar) {
      log('TX: 01 — sending CMD_GLASS_LONG_PRESS + CMD_APP_SHOW_PAIR + CMD_PAIR_SYNC_SUCCESS');
      (async () => {
        await writeChar.writeValueWithoutResponse(CMD_GLASS_LONG_PRESS);
        await writeChar.writeValueWithoutResponse(CMD_APP_SHOW_PAIR);
        // Also send host-initiated pair sync here in case the glasses respond to it
        // before sending longPressConfirmResponse.
        await writeChar.writeValueWithoutResponse(CMD_PAIR_SYNC_SUCCESS);
      })().catch(e => log(`TX 01 response error: ${e.message}`, 'err'));
    }
    return;
  }

  log(`TX: ${hex}`);
}

// ── Send simultaneous translation ──────────────────────────────────────────
async function sendTranslation() {
  const base    = document.getElementById('original').value;
  const baseTr  = document.getElementById('translation').value;
  const original    = `${base} ${sendCount}`;
  const translation = `${baseTr} ${sendCount}`;

  // Skip this tick if disconnected; reconnect() will resume the loop.
  if (!writeChar) return;

  try {
    log(`Sending [${sendCount}]: "${original}" / "${translation}"`);

    let frames, mtu = 185;
    try {
      frames = buildTranslationFrames(sessionId, original, translation, mtu);
      for (const frame of frames) {
        await writeChar.writeValueWithoutResponse(frame);
      }
    } catch (e) {
      if (e.name === 'InvalidModificationError' || e.message.includes('MTU')) {
        log('MTU too large, retrying with 23-byte MTU…');
        mtu = 23;
        frames = buildTranslationFrames(sessionId, original, translation, mtu);
        for (const frame of frames) {
          await writeChar.writeValueWithoutResponse(frame);
        }
      } else {
        throw e;
      }
    }

    await waitForAck(1000);
    log(`Sent (${frames.length} frame(s), MTU=${mtu})`, 'ok');

    sessionId = (sessionId % 255) + 1;
    sendCount++;
    counterEl.textContent = `Count: ${sendCount}`;

  } catch (e) {
    log(`Error: ${e.message}`, 'err');
    stopAuto();
  }
}

// ── Auto-send every 2 seconds ──────────────────────────────────────────────
function startAuto() {
  if (autoTimer) return;
  log('Auto-send started (every 2 s)');
  btnStart.disabled = true;
  btnStop.disabled  = false;
  sendTranslation();
  autoTimer = setInterval(sendTranslation, 2000);
}

function stopAuto() {
  clearInterval(autoTimer);
  autoTimer = null;
  log('Auto-send stopped');
  btnStart.disabled = false;
  btnStop.disabled  = true;
}

// ── Disconnect ─────────────────────────────────────────────────────────────
async function disconnect() {
  try {
    if (writeChar) await writeChar.writeValueWithoutResponse(CMD_DISCONNECT);
    device?.gatt.disconnect();
  } catch (_) {}
  onDisconnected();
}

function onDisconnected() {
  log('*** gattserverdisconnected fired ***', 'err');
  stopAuto();
  stopBtStatusPolling();
  longPressResolve = null;
  btnLongPress.style.display = 'none';
  writeChar              = null;
  txChar                 = null;
  txNotificationsWorking = false;
  isReady                = false;
  ackResolve             = null;
  device     = null;
  btnStart.disabled      = true;
  btnStop.disabled       = true;
  btnReset.disabled      = true;
  btnDisconnect.disabled = true;
  btnConnect.disabled    = false;
}
</script>
